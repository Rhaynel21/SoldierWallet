name: EAS Update

# Publishes an over-the-air EAS Update for the mobile app (apps/mobile).
# Runs headless using an Expo access token — no browser login needed.
#
# One-time setup:
#   1. Create a token at https://expo.dev/settings/access-tokens
#   2. In GitHub: Settings -> Secrets and variables -> Actions -> New repository
#      secret named EXPO_TOKEN with that value.
# Then this runs automatically on pushes to apps/mobile, or manually via
# "Run workflow".

on:
  push:
    branches: [main]
    paths:
      - 'apps/mobile/**'
  workflow_dispatch:
    inputs:
      branch:
        description: 'EAS Update branch (e.g. preview, production)'
        required: true
        default: 'preview'
      message:
        description: 'Update message'
        required: false
        default: 'Manual update via GitHub Actions'

jobs:
  update:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: |
          npm install --legacy-peer-deps
          npx expo install --fix

      - name: Publish EAS Update
        env:
          # Inlined into the JS bundle at export time so the app connects to Firestore.
          EXPO_PUBLIC_FIREBASE_API_KEY: ${{ secrets.EXPO_PUBLIC_FIREBASE_API_KEY }}
          EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          EXPO_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_PROJECT_ID }}
          EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          EXPO_PUBLIC_FIREBASE_APP_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_APP_ID }}
        run: >-
          eas update
          --branch ${{ github.event.inputs.branch || 'preview' }}
          --message "${{ github.event.inputs.message || format('Deploy {0}', github.sha) }}"
          --non-interactive
